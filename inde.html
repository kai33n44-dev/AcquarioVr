<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape the Matrix - Elevator VR</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#000; font-family: 'Courier New', monospace; }
  #info {
    position:absolute; top:0; left:0; width:100%; text-align:center;
    color:#0f0; padding:14px; z-index:10; pointer-events:none;
    text-shadow: 0 0 8px #0f0;
  }
  #info h1 { margin:4px; font-size: 20px; letter-spacing:2px; }
  #info p { margin:2px; font-size:13px; opacity:0.85; }
  #startBtn {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:20; background:#001a00; color:#0f0; border:2px solid #0f0;
    padding:16px 28px; font-size:18px; font-family:'Courier New',monospace;
    cursor:pointer; border-radius:6px; box-shadow:0 0 20px #0f0;
    letter-spacing:1px;
  }
  #startBtn:hover { background:#0f0; color:#000; }
  #crosshair {
    position:absolute; top:50%; left:50%; width:8px; height:8px;
    margin:-4px 0 0 -4px; border:2px solid #0f0; border-radius:50%;
    z-index:5; pointer-events:none; box-shadow:0 0 6px #0f0;
  }
  #hud {
    position:absolute; bottom:16px; left:16px; color:#0f0; z-index:10;
    font-size:14px; text-shadow:0 0 6px #0f0; pointer-events:none;
  }
  a#vrbutton {
    font-family:'Courier New',monospace !important;
  }
</style>
</head>
<body>

<div id="info">
  <h1>⚡ ESCAPE THE MATRIX ⚡</h1>
  <p>Sei intrappolato in un ascensore digitale. Premi i pulsanti per viaggiare tra i piani, recupera le 4 Chiavi Dati e trova l'uscita.</p>
  <p>Desktop: muovi con WASD, guarda col mouse (clicca per bloccare il cursore), clicca per interagire.</p>
</div>

<button id="startBtn">▶ ENTRA NELL'ASCENSORE</button>
<div id="crosshair" style="display:none;"></div>
<div id="hud" style="display:none;">Chiavi Dati: <span id="keyCount">0</span>/4</div>

<script async src="https://unpkg.com/[email protected]/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/[email protected]/build/three.module.js",
    "three/addons/": "https://unpkg.com/[email protected]/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';

let scene, camera, renderer, rig;
let raycaster = new THREE.Raycaster();
let tempMatrix = new THREE.Matrix4();
let controller1, controller2;
let interactiveObjects = [];
let keysCollected = 0;
const TOTAL_KEYS = 4;
let currentWorld = 'elevator';
let mouseLocked = false;
let keysHeld = {};
let yaw = 0, pitch = 0;

const worldGroups = {};
const worldSpawn = {
  elevator: new THREE.Vector3(0, 0, 0),
  world1: new THREE.Vector3(0, 0, 0),
  world2: new THREE.Vector3(0, 0, 0),
  world3: new THREE.Vector3(0, 0, 0),
  world4: new THREE.Vector3(0, 0, 0),
};

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.05, 200);

  rig = new THREE.Group();
  rig.add(camera);
  rig.position.set(0, 1.6, 1.2);
  scene.add(rig);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);
  document.body.appendChild(VRButton.createButton(renderer));

  // lighting
  scene.add(new THREE.AmbientLight(0x224422, 1.2));
  const dl = new THREE.DirectionalLight(0x00ff88, 0.6);
  dl.position.set(2, 4, 2);
  scene.add(dl);

  buildElevator();
  buildWorld1();
  buildWorld2();
  buildWorld3();
  buildWorld4();

  Object.keys(worldGroups).forEach(k => {
    worldGroups[k].visible = (k === 'elevator');
  });

  // VR controllers
  controller1 = renderer.xr.getController(0);
  controller1.addEventListener('selectstart', onSelect);
  scene.add(controller1);
  controller2 = renderer.xr.getController(1);
  controller2.addEventListener('selectstart', onSelect);
  scene.add(controller2);

  const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-5)]);
  const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({color:0x00ff00}));
  line.name = 'ray';
  controller1.add(line.clone());
  controller2.add(line.clone());

  window.addEventListener('resize', onResize);

  // Desktop controls
  document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('crosshair').style.display = 'block';
    document.getElementById('hud').style.display = 'block';
    renderer.domElement.requestPointerLock && renderer.domElement.requestPointerLock();
  });

  document.addEventListener('pointerlockchange', () => {
    mouseLocked = document.pointerLockElement === renderer.domElement;
  });

  document.addEventListener('mousemove', (e) => {
    if (!mouseLocked || renderer.xr.isPresenting) return;
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-1.2, Math.min(1.2, pitch));
    camera.rotation.set(pitch, yaw, 0, 'YXZ');
  });

  document.addEventListener('keydown', (e) => keysHeld[e.code] = true);
  document.addEventListener('keyup', (e) => keysHeld[e.code] = false);

  renderer.domElement.addEventListener('click', () => {
    if (renderer.xr.isPresenting) return;
    if (!mouseLocked) { renderer.domElement.requestPointerLock(); return; }
    desktopInteract();
  });
}

function onResize() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ---------- helpers ----------
function makeTextSprite(text, color='#00ff66', size=64) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.font = `bold ${size}px Courier New`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = color;
  ctx.shadowBlur = 20;
  ctx.fillText(text, canvas.width/2, canvas.height/2);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent:true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(2, 0.5, 1);
  return sprite;
}

function panelButton(label, x, y, z, color, onPress) {
  const geo = new THREE.CylinderGeometry(0.08, 0.08, 0.03, 24);
  const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.6 });
  const btn = new THREE.Mesh(geo, mat);
  btn.rotation.x = Math.PI/2;
  btn.position.set(x, y, z);
  btn.userData = { interactive:true, onPress, baseColor: color };
  scene.add(btn);
  interactiveObjects.push(btn);

  const label3d = makeTextSprite(label, '#ffffff', 70);
  label3d.scale.set(0.25, 0.12, 1);
  label3d.position.set(x, y + 0.13, z);
  scene.add(label3d);
  return btn;
}

function floatingItem(name, x, y, z, color, geo) {
  const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.9, metalness:0.3, roughness:0.2 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.userData = { interactive:true, isKey:true, name, baseY:y };
  mesh.userData.onPress = () => collectKey(mesh);
  interactiveObjects.push(mesh);
  return mesh;
}

function makeRoom(group, size, wallColor, floorColor) {
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(size, size),
    new THREE.MeshStandardMaterial({ color: floorColor, roughness:0.8 })
  );
  floor.rotation.x = -Math.PI/2;
  group.add(floor);

  const grid = new THREE.GridHelper(size, 20, wallColor, wallColor);
  grid.position.y = 0.01;
  group.add(grid);

  const ceil = new THREE.Mesh(
    new THREE.PlaneGeometry(size, size),
    new THREE.MeshStandardMaterial({ color: 0x000000 })
  );
  ceil.rotation.x = Math.PI/2;
  ceil.position.y = 4;
  group.add(ceil);
}

// ---------- Elevator ----------
function buildElevator() {
  const g = new THREE.Group();
  worldGroups['elevator'] = g;
  scene.add(g);

  const wallMat = new THREE.MeshStandardMaterial({ color: 0x111318, metalness:0.6, roughness:0.4 });
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, metalness:0.4, roughness:0.6 });

  const floor = new THREE.Mesh(new THREE.PlaneGeometry(3,3), floorMat);
  floor.rotation.x = -Math.PI/2;
  g.add(floor);

  const ceil = floor.clone();
  ceil.rotation.x = Math.PI/2;
  ceil.position.y = 3;
  g.add(ceil);

  const wallGeo = new THREE.PlaneGeometry(3,3);
  const back = new THREE.Mesh(wallGeo, wallMat); back.position.set(0,1.5,-1.5); g.add(back);
  const left = new THREE.Mesh(wallGeo, wallMat); left.position.set(-1.5,1.5,0); left.rotation.y = Math.PI/2; g.add(left);
  const right = new THREE.Mesh(wallGeo, wallMat); right.position.set(1.5,1.5,0); right.rotation.y = -Math.PI/2; g.add(right);
  const front = new THREE.Mesh(wallGeo, new THREE.MeshStandardMaterial({color:0x1a1a1a, metalness:0.8})); front.position.set(0,1.5,1.5); front.rotation.y = Math.PI; g.add(front);

  const title = makeTextSprite('MATRIX ELEVATOR', '#00ff66', 60);
  title.scale.set(1.4, 0.35, 1);
  title.position.set(0, 2.4, -1.48);
  g.add(title);

  // panel buttons piano 1-4
  panelButton('1', -0.6, 1.3, -1.45, 0x00ff66, () => travelTo('world1'));
  panelButton('2', -0.2, 1.3, -1.45, 0xff0044, () => travelTo('world2'));
  panelButton('3', 0.2, 1.3, -1.45, 0x00aaff, () => travelTo('world3'));
  panelButton('4', 0.6, 1.3, -1.45, 0xffaa00, () => travelTo('world4'));

  // exit button, hidden/disabled until all keys
  const exitBtn = panelButton('USCITA', 0, 0.9, -1.45, 0x333333, () => {
    if (keysCollected >= TOTAL_KEYS) triggerWin();
  });
  exitBtn.userData.isExit = true;
  exitBtn.scale.set(1.6,1,1);
}

function updateExitButton() {
  const exitBtn = interactiveObjects.find(o => o.userData.isExit);
  if (!exitBtn) return;
  if (keysCollected >= TOTAL_KEYS) {
    exitBtn.material.color.set(0x00ff00);
    exitBtn.material.emissive.set(0x00ff00);
    exitBtn.material.emissiveIntensity = 1.2;
  }
}

// ---------- Worlds ----------
function makePortalBack(group, color=0x00ffff) {
  const geo = new THREE.TorusGeometry(0.5, 0.08, 16, 32);
  const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.8 });
  const portal = new THREE.Mesh(geo, mat);
  portal.position.set(0, 1.4, -3);
  portal.userData = { interactive:true, onPress: () => travelTo('elevator') };
  group.add(portal);
  interactiveObjects.push(portal);
  const label = makeTextSprite('TORNA', '#00ffff', 60);
  label.position.set(0, 2.1, -3);
  label.scale.set(1,0.25,1);
  group.add(label);
  return portal;
}

function buildWorld1() {
  const g = new THREE.Group();
  worldGroups['world1'] = g;
  scene.add(g);
  makeRoom(g, 12, 0x00ff44, 0x001a05);
  const label = makeTextSprite('GIUNGLA DI CODICE', '#00ff66', 55);
  label.position.set(0,2.6,-3); label.scale.set(1.6,0.4,1);
  g.add(label);

  for (let i=0;i<40;i++) {
    const h = 0.5 + Math.random()*2;
    const geo = new THREE.BoxGeometry(0.08,h,0.08);
    const mat = new THREE.MeshStandardMaterial({color:0x003300, emissive:0x00ff44, emissiveIntensity:0.4});
    const bar = new THREE.Mesh(geo, mat);
    bar.position.set((Math.random()-0.5)*10, h/2, (Math.random()-0.5)*10 - 2);
    g.add(bar);
  }

  const key = floatingItem('Chiave Dati Verde', 0, 1.2, -3, 0x00ff88, new THREE.OctahedronGeometry(0.25));
  g.add(key);
  makePortalBack(g, 0x00ff88);
}

function buildWorld2() {
  const g = new THREE.Group();
  worldGroups['world2'] = g;
  scene.add(g);
  makeRoom(g, 12, 0xff2255, 0x220008);
  const label = makeTextSprite('SERVER FARM ROSSA', '#ff3355', 55);
  label.position.set(0,2.6,-3); label.scale.set(1.6,0.4,1);
  g.add(label);

  for (let i=0;i<10;i++) {
    const geo = new THREE.BoxGeometry(0.8,2.2,0.8);
    const mat = new THREE.MeshStandardMaterial({color:0x220000, emissive:0xff0033, emissiveIntensity:0.3});
    const box = new THREE.Mesh(geo, mat);
    box.position.set((Math.random()-0.5)*9, 1.1, (Math.random()-0.5)*9 - 2);
    g.add(box);
  }

  const key = floatingItem('Chiave Dati Rossa', 0, 1.2, -3, 0xff2255, new THREE.TetrahedronGeometry(0.3));
  g.add(key);
  makePortalBack(g, 0xff5577);
}

function buildWorld3() {
  const g = new THREE.Group();
  worldGroups['world3'] = g;
  scene.add(g);
  makeRoom(g, 12, 0x00aaff, 0x001122);
  const label = makeTextSprite('CITTA\' NEON', '#00aaff', 55);
  label.position.set(0,2.6,-3); label.scale.set(1.4,0.4,1);
  g.add(label);

  for (let i=0;i<8;i++) {
    const h = 1.5 + Math.random()*3;
    const geo = new THREE.BoxGeometry(1, h, 1);
    const mat = new THREE.MeshStandardMaterial({color:0x001a33, emissive:0x0088ff, emissiveIntensity:0.5, wireframe:false});
    const tower = new THREE.Mesh(geo, mat);
    tower.position.set((Math.random()-0.5)*9, h/2, (Math.random()-0.5)*9 - 2);
    g.add(tower);
  }

  const key = floatingItem('Chiave Dati Blu', 0, 1.2, -3, 0x00aaff, new THREE.IcosahedronGeometry(0.28));
  g.add(key);
  makePortalBack(g, 0x00ccff);
}

function buildWorld4() {
  const g = new THREE.Group();
  worldGroups['world4'] = g;
  scene.add(g);
  makeRoom(g, 12, 0xffaa00, 0x1a1200);
  const label = makeTextSprite('IL NUCLEO', '#ffaa00', 55);
  label.position.set(0,2.6,-3); label.scale.set(1.2,0.4,1);
  g.add(label);

  const coreGeo = new THREE.SphereGeometry(1.2, 24, 24);
  const coreMat = new THREE.MeshStandardMaterial({color:0x332200, emissive:0xffaa00, emissiveIntensity:0.4, wireframe:true});
  const core = new THREE.Mesh(coreGeo, coreMat);
  core.position.set(0,1.6,-5);
  g.add(core);
  core.userData.spin = true;
  g.userData.core = core;

  const key = floatingItem('Chiave Dati Dorata', 0, 1.2, -3, 0xffcc00, new THREE.DodecahedronGeometry(0.28));
  g.add(key);
  makePortalBack(g, 0xffcc66);
}

// ---------- Interaction ----------
function collectKey(mesh) {
  if (!mesh.userData.isKey || mesh.userData.collected) return;
  mesh.userData.collected = true;
  mesh.visible = false;
  keysCollected++;
  document.getElementById('keyCount').textContent = keysCollected;
  updateExitButton();
  interactiveObjects = interactiveObjects.filter(o => o !== mesh);
}

function travelTo(worldName) {
  if (currentWorld === worldName) return;
  worldGroups[currentWorld].visible = false;
  worldGroups[worldName].visible = true;
  currentWorld = worldName;
  const spawn = worldSpawn[worldName];
  rig.position.set(spawn.x, 0, spawn.z + 1.2);
  rig.rotation.set(0,0,0);
  if (!renderer.xr.isPresenting) {
    yaw = 0; pitch = 0;
    camera.rotation.set(0,0,0);
  }
}

function triggerWin() {
  const overlay = document.createElement('div');
  overlay.style.position = 'fixed';
  overlay.style.top = 0; overlay.style.left = 0;
  overlay.style.width = '100%'; overlay.style.height = '100%';
  overlay.style.background = 'rgba(0,10,0,0.92)';
  overlay.style.color = '#0f0';
  overlay.style.display = 'flex';
  overlay.style.flexDirection = 'column';
  overlay.style.alignItems = 'center';
  overlay.style.justifyContent = 'center';
  overlay.style.zIndex = 999;
  overlay.style.fontFamily = "'Courier New', monospace";
  overlay.style.textShadow = '0 0 10px #0f0';
  overlay.innerHTML = `<h1 style="font-size:34px;">SEI USCITO DALLA MATRICE</h1>
    <p style="font-size:16px;">Hai recuperato tutte e 4 le Chiavi Dati e trovato la via d'uscita.</p>`;
  document.body.appendChild(overlay);
}

function onSelect(event) {
  const controller = event.target;
  tempMatrix.identity().extractRotation(controller.matrixWorld);
  raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);
  const hits = raycaster.intersectObjects(interactiveObjects, false);
  if (hits.length > 0) {
    const obj = hits[0].object;
    if (obj.userData.onPress) obj.userData.onPress();
  }
}

function desktopInteract() {
  raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
  const hits = raycaster.intersectObjects(interactiveObjects, false);
  if (hits.length > 0) {
    const obj = hits[0].object;
    if (obj.userData.onPress) obj.userData.onPress();
  }
}

function updateDesktopMovement(dt) {
  if (renderer.xr.isPresenting || !mouseLocked) return;
  const speed = 2.2 * dt;
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  dir.y = 0; dir.normalize();
  const right = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0,1,0)).negate();

  if (keysHeld['KeyW']) rig.position.addScaledVector(dir, speed);
  if (keysHeld['KeyS']) rig.position.addScaledVector(dir, -speed);
  if (keysHeld['KeyA']) rig.position.addScaledVector(right, -speed);
  if (keysHeld['KeyD']) rig.position.addScaledVector(right, speed);
}

const clock = new THREE.Clock();
function animate() {
  renderer.setAnimationLoop(() => {
    const dt = clock.getDelta();
    const t = clock.elapsedTime;

    interactiveObjects.forEach(o => {
      if (o.userData.isKey) {
        o.rotation.y += dt * 1.5;
        o.position.y = o.userData.baseY + Math.sin(t*2)*0.08;
      }
    });

    const core = worldGroups['world4'] && worldGroups['world4'].userData.core;
    if (core) core.rotation.y += dt * 0.3;

    updateDesktopMovement(dt);

    renderer.render(scene, camera);
  });
}
</script>
</body>
</html>
